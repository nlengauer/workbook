<!-- Cursor Trail Script -->
<script>const cursor = document.getElementById('cursor');
        const colours = ['#080CFF', '#A400A4', '#FFDE00', '#00FF00', '#FF007F', '#008080', '#FF8C00', '#00CED1', '#FF69B4'];
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            const particle = document.createElement('div');
            particle.className = 'trail-particle trail-active';
            const size = Math.random() * 12 + 6;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(particle);
            
            // Remove particle after 8 seconds to match CSS animation
            setTimeout(() => {
                particle.remove();
            }, 8000);
        });</script>
<script>
  (function() {
    const bgColors = [
      '#F0F4FF', '#FFF0F0', '#F0FFF4', '#FDF2F8', 
      '#FFFBEB', '#F5F3FF', '#ECFEFF', '#F0FDF4', 
      '#F8FAFC', '#FEF2F2', '#FFF7ED', '#F0FDFA'
    ];
    let currentIndex = 0;
    const body = document.body;

    function changeColor() {
      const nextIndex = Math.floor(Math.random() * bgColors.length);
      // Ensure we don't pick the same color twice in a row
      currentIndex = nextIndex === currentIndex ? (nextIndex + 1) % bgColors.length : nextIndex;
      body.style.backgroundColor = bgColors[currentIndex];
    }

    // Initial call
    changeColor();
    
    setInterval(changeColor, 2000);
  })();
</script></body></html>
